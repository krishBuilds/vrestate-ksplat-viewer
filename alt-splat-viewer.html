<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Direct Splat Viewer</title>
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
        "gle-gs3d": "https://cdn.jsdelivr.net/npm/gle-gs3d@1.0.5/dist/esm/index.js"
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap');

    * {
      box-sizing: border-box;
    }

    body,
    html {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0f16;
      color: #fff;
      font-family: 'Montserrat', sans-serif;
    }

    #top-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 20;
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(4, 10, 18, 0.86);
      border-bottom: 1px solid rgba(255, 255, 255, 0.09);
    }

    #top-bar .label {
      font-size: 13px;
      opacity: 0.95;
      white-space: nowrap;
    }

    #scene-select {
      min-width: 170px;
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.05);
      color: #fff;
      padding: 8px 10px;
      font-size: 12px;
    }

    #scene-select option {
      color: #111;
    }

    #scene-url {
      flex: 1;
      min-width: 180px;
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.05);
      color: #fff;
      padding: 8px 10px;
      font-size: 12px;
    }

    #scene-url::placeholder {
      color: rgba(255, 255, 255, 0.55);
    }

    .btn {
      border: none;
      border-radius: 6px;
      padding: 8px 10px;
      color: #fff;
      background: rgba(255, 255, 255, 0.16);
      cursor: pointer;
      font-size: 12px;
    }

    .btn:hover {
      background: rgba(0, 0, 0, 0.7);
    }

    #status {
      margin-left: auto;
      font-size: 12px;
      opacity: 0.88;
      white-space: nowrap;
    }

    #viewer-stage {
      position: fixed;
      inset: 54px 0 0 0;
      overflow: hidden;
      background: #000;
    }

    #loading-overlay {
      position: absolute;
      inset: 54px 0 0 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: rgba(0, 0, 0, 0.7);
      z-index: 12000;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s ease-in-out;
    }

    #loading-overlay.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .earth-loader {
      position: relative;
      width: 94px;
      height: 94px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 28% 32%, rgba(80, 180, 255, 0.95), rgba(25, 75, 120, 0.9) 45%, rgba(11, 24, 44, 0.95) 70%, #050d1b 100%);
      overflow: hidden;
      animation: earth-rotation 2.2s linear infinite;
      box-shadow:
        inset -12px -14px 18px rgba(0, 0, 0, 0.55),
        0 0 18px rgba(110, 196, 255, 0.35);
      border: 3px solid rgba(173, 224, 255, 0.6);
      transform-style: preserve-3d;
    }

    .earth-loader::before {
      content: "";
      position: absolute;
      inset: -26%;
      border-radius: 50%;
      background:
        radial-gradient(circle at 65% 35%, rgba(45, 160, 90, 0.7), rgba(15, 96, 34, 0.4)),
        radial-gradient(circle at 25% 75%, rgba(52, 127, 201, 0.28), transparent 58%);
      transform: rotate(32deg) translateZ(-1px);
      opacity: 0.9;
      animation: earth-landmass 2.2s linear infinite reverse;
    }

    .earth-loader::after {
      content: "";
      position: absolute;
      inset: -35%;
      border-radius: 50%;
      border: 2px solid rgba(190, 225, 255, 0.22);
      border-right-color: rgba(190, 225, 255, 0);
      border-bottom-color: rgba(190, 225, 255, 0);
      animation: earth-atmosphere 2.8s linear infinite;
    }

    @keyframes earth-rotation {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes earth-landmass {
      to {
        transform: rotate(360deg) translateZ(-1px);
      }
    }

    @keyframes earth-atmosphere {
      to {
        transform: rotate(360deg);
      }
    }

    #viewer-root {
      position: absolute;
      inset: 0;
    }

    #error {
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: 12px;
      z-index: 30;
      background: rgba(255, 77, 77, 0.12);
      color: #ffd2d2;
      border-left: 3px solid #ff6262;
      border-radius: 6px;
      padding: 10px;
      font-size: 12px;
      display: none;
    }
  </style>
</head>
<body>
  <div id="top-bar">
    <div class="label">Direct scene:</div>
    <select id="scene-select">
      <option value="">-- Local quick scene --</option>
      <option value="./assets/Splat/externalview.ksplat">External View</option>
      <option value="./assets/Splat/floorplan.ksplat">Floorplan</option>
      <option value="./assets/Splat/FrontYard.ksplat">Front Yard</option>
      <option value="./assets/Splat/Interior.ksplat">Interior</option>
      <option value="./assets/Splat/BackYard.ksplat">Back Yard</option>
    </select>
    <div class="label">Custom URL:</div>
    <input id="scene-url" placeholder="https://.../scene.splat or local path" />
    <button id="load-scene" class="btn">Load</button>
    <button id="open-legacy" class="btn">Open Legacy (index.html)</button>
    <button id="back" class="btn">Back</button>
    <div id="status">Ready</div>
  </div>
  <div id="viewer-stage">
    <div id="viewer-root"></div>
  </div>
  <div id="loading-overlay">
    <div class="earth-loader" role="img" aria-label="Loading"></div>
  </div>
  <div id="error"></div>

  <script type="module">
    import * as GSPLAT from 'gle-gs3d';

    const query = new URLSearchParams(window.location.search);
    const sceneSelect = document.getElementById('scene-select');
    const sceneUrl = document.getElementById('scene-url');
    const loadButton = document.getElementById('load-scene');
    const legacyButton = document.getElementById('open-legacy');
    const backButton = document.getElementById('back');
    const status = document.getElementById('status');
    const viewerRoot = document.getElementById('viewer-root');
    const errorEl = document.getElementById('error');
    const loading = document.getElementById('loading-overlay');

    let viewerInstance = null;

    const availableScenes = [
      './assets/Splat/externalview.ksplat',
      './assets/Splat/floorplan.ksplat',
      './assets/Splat/FrontYard.ksplat',
      './assets/Splat/Interior.ksplat',
      './assets/Splat/BackYard.ksplat'
    ];

    function setStatus(text) {
      status.textContent = text;
      console.log(`[DirectSplat] ${text}`);
    }

    function showError(text) {
      errorEl.textContent = text;
      errorEl.style.display = 'block';
    }

    function clearError() {
      errorEl.style.display = 'none';
      errorEl.textContent = '';
    }

    function isSupportedPath(value) {
      return /\.(splat|ply|ksplat)(\?|$)/i.test(value || '');
    }

    function openLegacyScene(value) {
      const legacy = new URL('index.html', window.location.href);
      legacy.searchParams.set('scene', value);
      window.location.href = legacy.toString();
    }

    async function disposeViewer() {
      if (!viewerInstance) {
        return;
      }
      if (typeof viewerInstance.dispose === 'function') {
        try {
          await viewerInstance.dispose();
        } catch (error) {
          console.error(`[DirectSplat] dispose error: ${error?.message || error}`);
        }
      }
      viewerInstance = null;
    }

    async function loadScene(rawPath) {
      const target = `${rawPath || ''}`.trim();
      if (!target) {
        showError('No scene selected.');
        return;
      }
      if (!isSupportedPath(target)) {
        showError('Use .ksplat, .splat, or .ply for this direct viewer.');
        return;
      }

      if (!GSPLAT?.Viewer) {
        showError('Direct viewer library failed to load properly.');
        return;
      }

      clearError();
      viewerRoot.innerHTML = '';
      setLoading(true);
      setStatus('Loading scene...');
      await disposeViewer();

      try {
        viewerInstance = new GSPLAT.Viewer({
          rootElement: viewerRoot,
          background: 0x0b0f17
        });

        if (typeof viewerInstance.initialize === 'function') {
          viewerInstance.initialize();
        } else if (typeof viewerInstance.init === 'function') {
          viewerInstance.init();
        }

        const loadTarget = new URL(target, window.location.href).toString();
        if (typeof viewerInstance.loadFile === 'function') {
          await viewerInstance.loadFile(loadTarget);
        } else if (typeof viewerInstance.addSplatScene === 'function') {
          await viewerInstance.addSplatScene(loadTarget);
        } else {
          throw new Error('No supported load method on direct viewer instance.');
        }

        if (typeof viewerInstance.start === 'function') {
          viewerInstance.start();
        }
        setStatus(`Loaded: ${target}`);
      } catch (error) {
        const message = error?.message || String(error);
        showError(`Unable to load: ${message}`);
        setStatus('Load failed');
      } finally {
        setLoading(false);
      }
    }

    function setLoading(show) {
      loading.classList.toggle('visible', !!show);
    }

    const startupScene = query.get('scene');
    if (startupScene) {
      sceneUrl.value = startupScene;
      if (availableScenes.includes(startupScene)) {
        sceneSelect.value = startupScene;
      }
      loadScene(startupScene);
    }

    sceneSelect.addEventListener('change', () => {
      if (!sceneSelect.value) {
        return;
      }
      sceneUrl.value = sceneSelect.value;
      loadScene(sceneSelect.value);
    });

    loadButton.addEventListener('click', () => {
      const value = sceneUrl.value.trim();
      loadScene(value);
      if (!availableScenes.includes(value)) {
        sceneSelect.value = '';
      }
    });

    sceneUrl.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') {
        loadButton.click();
      }
    });

    legacyButton.addEventListener('click', () => {
      openLegacyScene(sceneUrl.value.trim());
    });

    backButton.addEventListener('click', () => {
      window.history.back();
    });
  </script>
</body>
</html>
